            .dropdown-container {
                position: relative; /* Needed for absolute positioning of the dropdown content */
                display: inline-block; /* Keeps the dropdown on one line */
            }

            .dropdown-button {
                background-color: #4CAF50; /* Green */
                color: white;
                padding: 10px 16px;
                font-size: 16px;
                border: none;
                cursor: pointer;
            }

            .dropdown-content {
                display: none; /* Hidden by default */
                position: absolute; /* Positions the dropdown relative to the container */
                background-color: #f9f9f9;
                min-width: 160px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1; /* Ensures the dropdown appears above other content */
            }

            .dropdown-content a {
                color: black;
                padding: 12px 16px;
                text-decoration: none;
                display: block; /* Makes the entire area clickable */
            }

            .dropdown-content a:hover {
                background-color: #ddd;
            }

            .dropdown-container:hover .dropdown-content {
                display: block; /* Show the dropdown on hover */
            }
        </style>
    </head>
